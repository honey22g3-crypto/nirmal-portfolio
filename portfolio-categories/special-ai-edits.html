<!DOCTYPE html>
<html>
<head>

<title>Podcast Editing | Nirmal Singh</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{
background:#070711;
color:white;
font-family:Segoe UI,Arial;
}



header{

padding:40px;
text-align:center;
font-size:45px;
font-weight:bold;
color:#b37cff;

}



.back{

display:inline-block;
margin:20px;
padding:12px 25px;
border:1px solid #b37cff;
border-radius:10px;
color:white;
text-decoration:none;

}



.gallery{

width:90%;
max-width:1200px;
margin:30px auto;

display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;

}



.video-card{

background:#111122;
padding:15px;
border-radius:20px;
border:1px solid #3b2960;
overflow:hidden;
transition:.3s;

}



.video-card:hover{

transform:translateY(-8px);
box-shadow:0 0 30px #b37cff55;

}



.video-card iframe{

width:100%;
height:315px;
border:none;
border-radius:15px;
display:block;

}



.title{

margin-top:15px;
font-size:22px;
color:#b37cff;
font-weight:bold;

}



/* Mobile */

@media(max-width:800px){

.gallery{

grid-template-columns:1fr;

}


.video-card iframe{

height:250px;

}

}


</style>

</head>


<body>


<header>
🎙 Special AI Edits
</header>


<a href="https://honey22g3-crypto.github.io/nirmal-portfolio/index.html#portfolio" class="back-btn">
← Back To Portfolio
</a>



<div class="gallery">



<div class="video-card"
onmouseenter="playVideo('video1')">

<iframe 
id="video1"
src="https://youtu.be/5MZcX0EC3Oc?si=jgNzC97RZbBXc1bl?enablejsapi=1&mute=1"
allow="autoplay">
</iframe>

<div class="title">
Special AI Edits 1
</div>

</div>





<div class="video-card"
onmouseenter="playVideo('video2')">

<iframe 
id="video2"
src="https://www.youtube.com/embed/dyZowvhEJ2g?enablejsapi=1&mute=1"
allow="autoplay">
</iframe>

<div class="title">
Special AI Edits 2
</div>

</div>




</div>





<script src="https://www.youtube.com/iframe_api"></script>


<script>


let players={};



function onYouTubeIframeAPIReady(){

players['video1']=new YT.Player('video1');

players['video2']=new YT.Player('video2');

}



function playVideo(id){

if(players[id]){

players[id].playVideo();

}

}


</script>


</body>
</html>
