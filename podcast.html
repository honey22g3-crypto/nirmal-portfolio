<!DOCTYPE html>
<html>
<head>

<title>Podcast Editing | Nirmal Singh</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#070711;
color:white;
font-family:Segoe UI,Arial;
}


header{

padding:40px;
text-align:center;
font-size:45px;
font-weight:bold;
color:#b37cff;

}


.back{

display:inline-block;
margin:20px;
padding:12px 25px;
border:1px solid #b37cff;
border-radius:10px;
color:white;
text-decoration:none;

}


.gallery{

width:90%;
margin:30px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;

}



.video-card{

background:#111122;
padding:20px;
border-radius:20px;
border:1px solid #3b2960;
transition:.3s;

}



.video-card:hover{

transform:translateY(-8px);
box-shadow:0 0 30px #b37cff55;

}



iframe{

width:100%;
height:250px;
border-radius:15px;
border:none;

}



.title{

margin-top:15px;
font-size:22px;
color:#b37cff;
font-weight:bold;

}



</style>

</head>


<body>


<header>
🎙 Podcast Editing Portfolio
</header>


<a class="back" href="index.html">
← Back To Portfolio
</a>



<div class="gallery">



<div class="video-card"
onmouseenter="playVideo('video1')"
onmouseleave="pauseVideo('video1')">

<iframe 
id="video1"
src="https://www.youtube.com/embed/vY0kqQYFORQ?enablejsapi=1&mute=1">
</iframe>

<div class="title">
Podcast Video 1
</div>

</div>





<div class="video-card"
onmouseenter="playVideo('video2')"
onmouseleave="pauseVideo('video2')">

<iframe 
id="video2"
src="https://www.youtube.com/embed/dyZowvhEJ2g?enablejsapi=1&mute=1">
</iframe>

<div class="title">
Special AI Edits 2
</div>

</div>





<div class="video-card">

<iframe 
src="https://www.instagram.com/reel/DTyhHk3kzVI/embed/">
</iframe>

<div class="title">
Special AI Edits 3
</div>

</div>





<div class="video-card">

<iframe 
src="https://www.instagram.com/reel/DWZg_tmD5cU/embed/">
</iframe>

<div class="title">
Special AI Edits 4
</div>

</div>




<script src="https://www.youtube.com/iframe_api"></script>


<script>


let players={};



function onYouTubeIframeAPIReady(){

players['video1']=new YT.Player('video1');

players['video2']=new YT.Player('video2');

}



function playVideo(id){

if(players[id]){

players[id].playVideo();

}

}



function pauseVideo(id){

if(players[id]){

players[id].pauseVideo();

}

}



</script>



</body>
</html>
