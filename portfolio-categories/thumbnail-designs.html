<style>

*{
margin:0;
padding:0;

body{

}



header{

.back{

display:inline-block;
margin:20px;
padding:12px 25px;
border:1px solid #b37cff;
border-radius:10px;
color:white;
text-decoration:none;

}



.gallery{

width:90%;
max-width:1200px;
margin:30px auto;

display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;

}

.back-btn{

display:inline-block;
margin:20px;
padding:12px 28px;

border:1px solid #b37cff;
border-radius:12px;

color:white;
text-decoration:none;

font-size:16px;
font-weight:600;

background:#111122;

transition:.3s ease;

}


.back-btn:hover{

background:#b37cff;
color:#070711;

box-shadow:0 0 25px #b37cff;

transform:translateY(-4px);

}


.back-btn:active{

transform:scale(.95);

}

.video-card{

background:#111122;
padding:15px;
border-radius:20px;
border:1px solid #3b2960;
overflow:hidden;
transition:.3s;

}



.video-card:hover{

transform:translateY(-8px);
box-shadow:0 0 30px #b37cff55;

}



.video-card iframe{

width:100%;
height:315px;
border:none;
border-radius:15px;
display:block;

}



.title{

margin-top:15px;
font-size:22px;
color:#b37cff;
font-weight:bold;

}



/* Mobile */

@media(max-width:800px){

.gallery{

grid-template-columns:1fr;

}


.video-card iframe{

height:250px;

}

}


</style>

<div class="gallery">



<script>
let images = [
    "Images/ChatGPT Image Jun 11, 2026, 09_43_59 PM.png",
    "Images/ChatGPT Image Jun 11, 2026, 09_43_56 PM.png",  
    "Images/ChatGPT Image Jun 11, 2026, 09_43_54 PM.png",    
    "Images/photo4.png",
    "Images/photo5.png"  
];

let current = 0;
let autoSwipeTimer; // Timer store karne ke liye variable

function openGallery(){
    document.getElementById("galleryModal").style.display="flex";
    showImage();
    startAutoSwipe(); // Gallery khulte hi auto-swipe shuru
}

function closeGallery(){
    document.getElementById("galleryModal").style.display="none";
    stopAutoSwipe(); // Gallery band hote hi auto-swipe band
}

function showImage(){
    document.getElementById("galleryImage").src = images[current];
}

function nextImage(){
    current++;
    if(current >= images.length){
        current=0;
    }
    showImage();
    resetAutoSwipe(); // User jab manually next kare, timer reset ho jaye
}

function prevImage(){
    current--;
    if(current < 0){
        current=images.length-1;
    }
    showImage();
    resetAutoSwipe(); // User jab manually prev kare, timer reset ho jaye
}

// === Auto Swipe Functions ===

function startAutoSwipe() {
    // 3000 ka matlab hai 3 seconds (Aap ise apne hisaab se kam/zyada kar sakte hain)
    autoSwipeTimer = setInterval(nextImage, 3000); 
}

function stopAutoSwipe() {
    clearInterval(autoSwipeTimer);
}

function resetAutoSwipe() {
    stopAutoSwipe(); 
    startAutoSwipe(); 
}
</script>
