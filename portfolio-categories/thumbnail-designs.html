<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#070711;
color:white;
font-family:Segoe UI,Arial;
}


header{

padding:40px;
text-align:center;
font-size:45px;
font-weight:bold;
color:#b37cff;

}


.back-btn{

display:inline-block;
margin:20px;
padding:12px 28px;

border:1px solid #b37cff;
border-radius:12px;

color:white;
text-decoration:none;

font-size:16px;
font-weight:600;

background:#111122;

transition:.3s ease;

}


.back-btn:hover{

background:#b37cff;
color:#070711;

box-shadow:0 0 25px #b37cff;

transform:translateY(-4px);

}


.gallery{

width:90%;
max-width:1200px;
margin:30px auto;

display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;

}



.video-card{

background:#111122;

padding:15px;

border-radius:20px;

border:1px solid #3b2960;

overflow:hidden;

transition:.3s;

}



.video-card:hover{

transform:translateY(-8px);

box-shadow:0 0 30px #b37cff55;

}



/* Thumbnail */

.thumbnail{

width:100%;

height:315px;

object-fit:cover;

border-radius:15px;

display:block;

cursor:pointer;

transition:.3s;

}



.thumbnail:hover{

transform:scale(1.03);

box-shadow:0 0 25px #b37cff;

}



.title{

margin-top:15px;

font-size:22px;

color:#b37cff;

font-weight:bold;

}



/* Mobile */

@media(max-width:800px){

.gallery{

grid-template-columns:1fr;

}


.thumbnail{

height:250px;

}

}


</style>


</head>
